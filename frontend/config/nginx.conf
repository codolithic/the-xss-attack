# config/nginx.conf
load_module modules/ngx_http_js_module.so;
events {}

http {
    include mime.types;
    default_type application/octet-stream;

    js_path "/etc/nginx/njs/";
    js_import csp from csp.js;

    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        location ~* \.(png|jpg|jpeg|svg)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        location / {
            js_content csp.serveIndex;
        }
    }
}
